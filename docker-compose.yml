services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dovideo
      POSTGRES_USER: dovideo
      POSTGRES_PASSWORD: dovideo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dovideo -d dovideo"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_API_CORS_ALLOW_ORIGIN: >-
        http://localhost:5173,http://localhost:8080,
        http://127.0.0.1:5173,http://127.0.0.1:8080
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/dovideo;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}

  qdrant:
    image: qdrant/qdrant:v1.15.4
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 3s
      retries: 20

  artifact-init:
    build: ./backend
    user: "0:0"
    command: chown -R appuser:appuser /app/artifacts
    volumes:
      - artifact_data:/app/artifacts

  api:
    build: ./backend
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      DOVIDEO_APP_NAME: audivise
      DOVIDEO_DATABASE_URL: postgresql+psycopg://dovideo:dovideo@postgres:5432/dovideo
      DOVIDEO_REDIS_URL: redis://redis:6379/0
      DOVIDEO_EXECUTION_LEASE_TTL_SECONDS: "90"
      DOVIDEO_EXECUTION_LEASE_RENEW_INTERVAL_SECONDS: "30"
      DOVIDEO_STORAGE_BACKEND: minio
      DOVIDEO_MINIO_ENDPOINT: minio:9000
      DOVIDEO_MINIO_PUBLIC_ENDPOINT: ${DOVIDEO_MINIO_PUBLIC_ENDPOINT:-localhost:9000}
      DOVIDEO_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      DOVIDEO_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      DOVIDEO_QDRANT_URL: http://qdrant:6333
      DOVIDEO_VECTOR_SEARCH_ENABLED: "true"
      DOVIDEO_DISPATCH_TASKS: "true"
      DOVIDEO_UPLOAD_PROGRESS_CACHE_ENABLED: "true"
      DOVIDEO_ARTIFACT_DIR: /app/artifacts
      DOVIDEO_ASR_API_URL: ${DOVIDEO_ASR_API_URL:-}
      DOVIDEO_ASR_API_KEY: ${DOVIDEO_ASR_API_KEY:-}
      DOVIDEO_ASR_MODEL: ${DOVIDEO_ASR_MODEL:-whisper-1}
      DOVIDEO_LLM_BASE_URL: ${DOVIDEO_LLM_BASE_URL:-}
      DOVIDEO_LLM_API_KEY: ${DOVIDEO_LLM_API_KEY:-}
      DOVIDEO_LLM_MODEL: ${DOVIDEO_LLM_MODEL:-deepseek-ai/DeepSeek-V3}
    ports:
      - "8000:8000"
    volumes:
      - artifact_data:/app/artifacts
    depends_on:
      artifact-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 20

  worker:
    build: ./backend
    command: celery -A app.worker.celery_app.celery_app worker --loglevel=INFO --concurrency=2
    environment:
      DOVIDEO_APP_NAME: audivise
      DOVIDEO_DATABASE_URL: postgresql+psycopg://dovideo:dovideo@postgres:5432/dovideo
      DOVIDEO_REDIS_URL: redis://redis:6379/0
      DOVIDEO_EXECUTION_LEASE_TTL_SECONDS: "90"
      DOVIDEO_EXECUTION_LEASE_RENEW_INTERVAL_SECONDS: "30"
      DOVIDEO_STORAGE_BACKEND: minio
      DOVIDEO_MINIO_ENDPOINT: minio:9000
      DOVIDEO_MINIO_PUBLIC_ENDPOINT: ${DOVIDEO_MINIO_PUBLIC_ENDPOINT:-localhost:9000}
      DOVIDEO_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      DOVIDEO_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      DOVIDEO_QDRANT_URL: http://qdrant:6333
      DOVIDEO_VECTOR_SEARCH_ENABLED: "true"
      DOVIDEO_UPLOAD_PROGRESS_CACHE_ENABLED: "true"
      DOVIDEO_ARTIFACT_DIR: /app/artifacts
      DOVIDEO_ASR_API_URL: ${DOVIDEO_ASR_API_URL:-}
      DOVIDEO_ASR_API_KEY: ${DOVIDEO_ASR_API_KEY:-}
      DOVIDEO_ASR_MODEL: ${DOVIDEO_ASR_MODEL:-whisper-1}
      DOVIDEO_LLM_BASE_URL: ${DOVIDEO_LLM_BASE_URL:-}
      DOVIDEO_LLM_API_KEY: ${DOVIDEO_LLM_API_KEY:-}
      DOVIDEO_LLM_MODEL: ${DOVIDEO_LLM_MODEL:-deepseek-ai/DeepSeek-V3}
    volumes:
      - artifact_data:/app/artifacts
    depends_on:
      artifact-init:
        condition: service_completed_successfully
      api:
        condition: service_healthy

  web:
    build: ./client
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
  qdrant_data:
  artifact_data:
